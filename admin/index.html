<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Scriptorium | Admin | Philosrach</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-input { width: 100%; padding: 0.8rem; background: var(--obsidian); border: 1px solid var(--border-gold); color: var(--ivory); font-family: 'Inter', sans-serif; margin-bottom: 1rem; }
    .admin-input:focus { outline: none; border-color: var(--gold); }
    .admin-btn { padding: 0.8rem 1.5rem; background: var(--surface-dark); border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel', serif; cursor: pointer; transition: 0.3s; }
    .admin-btn:hover { background: var(--gold); color: var(--obsidian); }
    .status-msg { margin-top: 1rem; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">Philosrach</a>
    </div>
  </nav>

  <main style="max-width: 800px; margin: 120px auto 4rem auto; padding: 2rem;">
    <div style="text-align: center; margin-bottom: 3rem;">
      <h1 class="hero-title" style="font-size: 3rem; background: none; color: var(--gold); -webkit-text-fill-color: var(--gold);">The Scriptorium</h1>
      <p class="hero-subtitle">Administrative Control</p>
    </div>

    <!-- Auth Section -->
    <div id="auth-section" class="manuscript-card neural-border" style="max-width: 400px; margin: 0 auto; text-align: center;">
      <h3 style="color: var(--gold); margin-bottom: 1.5rem;">Authenticate</h3>
      <input type="email" id="email" class="admin-input" placeholder="Email">
      <input type="password" id="password" class="admin-input" placeholder="Password">
      <button id="login-btn" class="admin-btn" style="width: 100%;">Enter</button>
      <div id="auth-status" class="status-msg" style="color: coral;"></div>
    </div>

    <!-- Admin Tools Section -->
    <div id="admin-section" style="display: none;">
      <div style="text-align: right; margin-bottom: 2rem;">
        <span id="user-display" style="color: var(--parchment-dark); font-family: 'Cormorant Garamond', serif; border-right: 1px solid var(--border-gold); padding-right: 1rem; margin-right: 1rem;"></span>
        <button id="logout-btn" class="admin-btn" style="padding: 0.4rem 1rem;">Leave</button>
      </div>

      <div class="manuscript-card neural-border">
        <h3 style="color: var(--gold); margin-bottom: 1.5rem;">New Journal Chronicle</h3>
        <input type="text" id="j-date" class="admin-input" placeholder="Custom Date (Optional)">
        <textarea id="j-content" rows="4" class="admin-input" placeholder="Chronicle Content (HTML supported)"></textarea>
        <button id="save-journal" class="admin-btn">Inscribe Chronicle</button>
        <div id="j-status" class="status-msg"></div>
      </div>
      
      <!-- Other panels could be added here similar to existing logic -->
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    const authSec = document.getElementById('auth-section');
    const adminSec = document.getElementById('admin-section');
    const authStatus = document.getElementById('auth-status');
    
    async function checkAuth() {
      const { data } = await sb.auth.getSession();
      if (data.session) {
        authSec.style.display = 'none';
        adminSec.style.display = 'block';
        document.getElementById('user-display').innerText = data.session.user.email;
      } else {
        authSec.style.display = 'block';
        adminSec.style.display = 'none';
      }
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      authStatus.innerText = "Authenticating...";
      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      if (error) authStatus.innerText = error.message;
      else { authStatus.innerText = ""; checkAuth(); }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      checkAuth();
    });

    document.getElementById('save-journal').addEventListener('click', async () => {
      const msg = document.getElementById('j-status');
      msg.innerText = "Inscribing...";
      const { error } = await sb.from('journal_entries').insert([{
        date_text: document.getElementById('j-date').value,
        content: document.getElementById('j-content').value
      }]);
      if (error) { msg.innerText = error.message; msg.style.color = "coral"; }
      else { msg.innerText = "Success."; msg.style.color = "var(--gold)"; }
    });

    checkAuth();
  </script>
</body>
</html>
